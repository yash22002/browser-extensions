<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSync</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            color: #f8fafc;
            min-width: 320px;
        }
        .container {
            padding: 16px;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 8px;
        }
        button {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            white-space: nowrap;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        .linkedin-btn {
            background-color: #0077b5;
            color: white;
        }
        .github-btn {
            background-color: #333333;
            color: white;
            border: 1px solid #444;
        }
        .portfolio-btn {
            background-color: #4f46e5;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Synced Links</h1>
        
        <div class="links">
            <div class="row">
                <button class="copy-btn linkedin-btn" data-url="https://www.linkedin.com/in/pratham-backend-dev">Copy LinkedIn</button>
                <button class="open-btn linkedin-btn" data-url="https://www.linkedin.com/in/pratham-backend-dev">Open</button>
            </div>

            <div class="row">
                <button class="copy-btn github-btn" data-url="https://github.com/yash22002">Copy GitHub</button>
                <button class="open-btn github-btn" data-url="https://github.com/yash22002">Open</button>
            </div>

            <div class="row">
                <button class="copy-btn portfolio-btn" data-url="Personal Portfolio Website">Copy Portfolio</button>
                <button class="open-btn portfolio-btn" data-url="Personal Portfolio Website">Open</button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
